version: 1

formatters:

  standard:
    format: "%(asctime)s | %(levelname)s | %(message)s"

handlers:

  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO

  file:
    class: logging.FileHandler
    formatter: standard
    filename: "data/output/logs/pipeline.log"
    mode: a
    level: INFO

root:
  handlers:
    - console
    - file
  level: INFO